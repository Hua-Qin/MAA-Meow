name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      maa_repo:
        description: 'MAA Core GitHub repo (owner/repo)'
        required: false
        default: 'MaaAssistantArknights/MaaAssistantArknights'
      maa_tag:
        description: 'MAA Core release tag'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;29.0.13113456" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OCR conversion deps
        run: python -m pip install -r scripts/requirements.txt

      - name: Download and deploy MAA Core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $args = @("--clean")
          $MAA_TAG = "${{ github.event.inputs.maa_tag }}"
          if ($MAA_TAG -ne $null -and $MAA_TAG -ne "latest") {
            $args += "--tag", $MAA_TAG
          }
          $MAA_REPO = "${{ github.event.inputs.maa_repo }}"
          if ($MAA_REPO -ne $null -and $MAA_REPO -ne "MaaAssistantArknights/MaaAssistantArknights") {
            $args += "--repo", $MAA_REPO
          }
          python scripts/setup_maa_core.py $args

      - name: Print MAA Resource version
        run: cat app/src/main/assets/MaaSync/MaaResource/version.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          [System.Convert]::FromBase64String($env:KEYSTORE_BASE64) | Set-Content -Path "${{ github.workspace }}\release.jks" -Encoding Byte

      - name: Build Release APK
        env:
          KEYSTORE_PATH: "${{ github.workspace }}\release.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          .\gradlew.bat clean assembleRelease

      - name: Rename APK
        run: |
          cd app\build\outputs\apk\release
          $TAG = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          Get-ChildItem -Filter *.apk | ForEach-Object {
            Rename-Item $_.FullName "MaaMeow-${TAG}-universal.apk"
          }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-universal
          path: app/build/outputs/apk/release/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate changelog
        run: |
          git-cliff --current --strip header -o RELEASE_NOTES.md
          Add-Content -Path RELEASE_NOTES.md -Value @"

---

[已有 Mirror酱 CDK？前往 Mirror酱 高速下载](https://mirrorchyan.com/zh/projects?rid=MAA&os=android&source=maagh-release)
"@

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-apk-*
          merge-multiple: true
          path: apks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: apks/*.apk
          body_path: RELEASE_NOTES.md